<!DOCTYPE html>
<html>
<head>
  <title>Password, Shearwater Productions</title>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

<div class="page">

  <header class="top-bar">
    <div class="brand">
      <h1>Shearwater Productions</h1>
      <img src="assets/logo.png" alt="Shearwater Productions logo" class="logo">
    </div>

    <nav class="nav-menu">
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
    </nav>
  </header>

  <div class="main">

    <section class="password-page">
      <h2 class="password-heading">Enter Password</h2>

      <div class="password-form">
        <input
          type="text"
          id="passwordInput"
          class="password-input"
          placeholder="Enter password..."
          autocomplete="off"
        >

        <button id="passwordSubmit" class="password-submit" aria-label="Submit password">
          →
        </button>
      </div>

      <p id="passwordMessage" class="password-message"></p>
    </section>

    <footer class="site-footer">
      <div class="footer-left">
        <a href="https://www.youtube.com/@ShearwaterProductions" target="_blank" class="footer-icon-link">
          <img src="assets/footeryoutubelogo.png" alt="YouTube" class="footer-icon">
        </a>

        <a href="password.html" class="footer-icon-link">
          <img src="assets/footerpasswordpagelogo.png" alt="Password Page" class="footer-icon">
        </a>
      </div>

      <div class="footer-right">
        <span class="footer-site-name">Shearwater Productions</span>
      </div>
    </footer>

  </div>
</div>

<script>
  const passwordRoutes = {
    "backtohome": "index.html"
    "earthyvessel423": "https://steamcommunity.com/profiles/76561199137261821/"

  };

  const passwordInput = document.getElementById("passwordInput");
  const passwordSubmit = document.getElementById("passwordSubmit");
  const passwordMessage = document.getElementById("passwordMessage");

  function handlePasswordSubmit() {
    const enteredPassword = passwordInput.value.trim().toLowerCase();

    if (passwordRoutes[enteredPassword]) {
      window.location.href = passwordRoutes[enteredPassword];
    } else {
      passwordMessage.textContent = "Password not recognized.";
    }
  }

  passwordSubmit.addEventListener("click", handlePasswordSubmit);

  passwordInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      handlePasswordSubmit();
    }
  });
</script>

</body>
</html>
